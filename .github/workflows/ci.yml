name: Continuous Integration
on:
  push:
    branches: ["main"]
jobs:
  build:
    name: Build libs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Build libs
        run: bun run build
      - name: Test
        run: bun run test
      - name: Publish nightly release
        run: bunx pkg-pr-new publish './packages/*'
  docs:
    name: Build docs
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Build deps
        run: bun run build
      - name: Build Ministory
        run: bun run build
        working-directory: apps/ministory
      - name: Build docs
        run: bun run docs:build
      - name: Move Ministory build
        run: mv apps/ministory/dist dist/ministory
      - name: Upload static files as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
